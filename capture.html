<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل سلعة</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; direction: rtl; }
.app { max-width: 960px; margin: 0 auto; padding: 20px; }
h1 { text-align: center; font-size: 24px; padding: 24px 0; color: #38bdf8; border-bottom: 2px solid #1e293b; margin-bottom: 24px; }
.home-link { display: block; text-align: center; color: #64748b; font-size: 13px; margin-top: -14px; margin-bottom: 24px; text-decoration: none; }
.home-link:hover { color: #38bdf8; }
.card { background: #1e293b; border-radius: 14px; padding: 24px; margin-bottom: 20px; border: 1px solid #334155; }
.card h2 { font-size: 18px; margin-bottom: 16px; color: #38bdf8; display: flex; align-items: center; gap: 8px; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
label { font-size: 14px; color: #94a3b8; }
input, select, textarea { padding: 12px 14px; background: #0f172a; border: 2px solid #334155; border-radius: 10px; color: #e2e8f0; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; width: 100%; }
input:focus, select:focus, textarea:focus { border-color: #38bdf8; }
select { cursor: pointer; }
option { background: #0f172a; }
textarea { resize: vertical; min-height: 70px; }
.btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 15px; font-family: inherit; cursor: pointer; transition: all 0.2s; font-weight: 600; }
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: #38bdf8; color: #0f172a; }
.btn-primary:hover { background: #7dd3fc; }
.btn-secondary { background: #475569; color: #e2e8f0; }
.btn-secondary:hover { background: #64748b; }
.btn-success { background: #22c55e; color: #fff; width: 100%; font-size: 17px; padding: 16px 24px; }
.btn-success:hover { background: #4ade80; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.new-section-btn { background: transparent; border: 2px dashed #475569; color: #94a3b8; width: 100%; padding: 12px; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: border-color 0.2s, color 0.2s; margin-top: 10px; }
.new-section-btn:hover { border-color: #38bdf8; color: #38bdf8; }
.new-section-form { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #334155; }
.new-section-form.show { display: block; }
.img-upload-area { border: 2px dashed #475569; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
.img-upload-area:hover { border-color: #38bdf8; }
.img-upload-area img { max-width: 100%; max-height: 160px; border-radius: 8px; object-fit: contain; }
.img-upload-area .upload-text { color: #64748b; font-size: 14px; }
.img-remove-btn { display: inline-block; margin-top: 8px; padding: 4px 12px; background: #ef4444; color: #fff; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #22c55e; color: #fff; padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 600; transition: transform 0.3s; z-index: 200; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: #ef4444; }
.auth-gate { position: fixed; inset: 0; background: #0f172a; z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-box { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 340px; text-align: center; }
.auth-icon { font-size: 40px; margin-bottom: 12px; }
.auth-box h2 { color: #38bdf8; font-size: 20px; margin-bottom: 20px; }
.auth-box input { width: 100%; text-align: center; letter-spacing: 4px; font-size: 20px; margin-bottom: 14px; }
.auth-box .btn { width: 100%; }
.auth-error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }
.auth-error.show { display: block; }
.auth-shake { animation: authShake 0.35s; }
@keyframes authShake { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-8px)} 40%,60%{transform:translateX(8px)} }
</style>
</head>
<body>
<div class="auth-gate" id="authGate">
  <div class="auth-box" id="authBox">
    <div class="auth-icon">&#128274;</div>
    <h2>الدخول محمي</h2>
    <input type="password" id="authInput" inputmode="numeric" autocomplete="off" placeholder="الرقم السري">
    <button class="btn btn-primary" onclick="checkAuth()">دخول</button>
    <div class="auth-error" id="authError">الرقم السري غير صحيح</div>
  </div>
</div>

<div class="app" id="appRoot" style="display:none;">
  <h1>&#128248; تسجيل سلعة</h1>
  <a class="home-link" href="index.html">&#8592; الموقع الرئيسي</a>

  <div class="card">
    <h2>&#128193; اختر القسم</h2>
    <div class="form-group">
      <select id="sectionSelect" onchange="onSectionChange()"><option value="">-- اختر القسم --</option></select>
    </div>
    <button class="new-section-btn" onclick="toggleNewSectionForm()">&#10133; إنشاء قسم جديد</button>
    <div class="new-section-form" id="newSectionForm">
      <div class="form-group"><label>اسم القسم</label><input type="text" id="newSectionName" placeholder="مثال: الجزئيات"></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="saveNewSection()">حفظ القسم</button><button class="btn btn-secondary" onclick="toggleNewSectionForm()">إلغاء</button></div>
    </div>
  </div>

  <div class="card" id="itemFormCard" style="display:none;">
    <h2 id="itemFormTitle"></h2>
    <div class="form-group"><label>صورة السلعة</label><div class="img-upload-area" onclick="document.getElementById('qaImage').click()"><div class="upload-text" id="qaImgPlaceholder">اضغط للتصوير أو اختيار صورة</div><img id="qaImgPreview" style="display:none;"><input type="file" id="qaImage" accept="image/*" capture="environment" onchange="handleQaImageUpload(event)" style="display:none;"></div><button class="img-remove-btn" id="qaImgRemoveBtn" style="display:none;" onclick="removeQaImage(event)">حذف الصورة</button><input type="hidden" id="qaImageData" value=""></div>
    <div class="form-group"><label>اسم السلعة</label><input type="text" id="qaName" placeholder="مثال: قالب سيليكون دائري"></div>
    <div class="form-group"><label>رقم الكاتالوج أو الكود</label><input type="text" id="qaCatalog" placeholder="مثال: SC-104" dir="ltr"></div>
    <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="qaPhone" placeholder="96512345678" dir="ltr"></div>
    <div class="form-group"><label>ملاحظات (اختياري)</label><textarea id="qaNotes" placeholder="أي ملاحظات إضافية..."></textarea></div>
    <button class="btn btn-success" onclick="saveQuickadd()">&#128190; حفظ السلعة</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AUTH_KEY = 'material_cost_auth';
const AUTH_PIN = '232344';
function unlockApp() {
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
}
function checkAuth() {
  const input = document.getElementById('authInput');
  if (input.value === AUTH_PIN) {
    localStorage.setItem(AUTH_KEY, '1');
    unlockApp();
  } else {
    const err = document.getElementById('authError'), box = document.getElementById('authBox');
    err.classList.add('show');
    box.classList.remove('auth-shake'); void box.offsetWidth; box.classList.add('auth-shake');
    input.value = '';
    input.focus();
  }
}
document.getElementById('authInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkAuth(); });
if (localStorage.getItem(AUTH_KEY) === '1') unlockApp();

const STORAGE_KEY = 'material_cost_data';
const FIREBASE_URL = 'https://nawwaf2-66f3c-default-rtdb.firebaseio.com';
function showToast(msg, err) { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(err?' error':''); setTimeout(()=>t.className='toast',2500); }

let data = null;

function loadLocalData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) return JSON.parse(saved);
  return { sections: ['الشموع','السيليكون','الفيلمنت'], materials: [], packaging: [], nextId: 1, nextPkgId: 1 };
}

function fetchData() {
  data = loadLocalData();
  populateSectionSelect();
  fetch(FIREBASE_URL + '/material_cost_data.json')
    .then(r => r.json())
    .then(remote => { if (remote) { data = remote; populateSectionSelect(); } })
    .catch(()=>{});
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  fetch(FIREBASE_URL + '/material_cost_data.json', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) }).catch(()=>{});
}

function populateSectionSelect(){
  const s = document.getElementById('sectionSelect'), prev = s.value;
  s.innerHTML = '<option value="">-- اختر القسم --</option>' + data.sections.map(x => `<option value="${x}">${x}</option>`).join('');
  if (prev && data.sections.includes(prev)) s.value = prev;
}

function onSectionChange(){
  const sec = document.getElementById('sectionSelect').value;
  const card = document.getElementById('itemFormCard');
  if (!sec) { card.style.display = 'none'; return; }
  document.getElementById('itemFormTitle').textContent = sec;
  card.style.display = 'block';
}

function toggleNewSectionForm(){
  const f = document.getElementById('newSectionForm');
  f.classList.toggle('show');
  if (f.classList.contains('show')) { document.getElementById('newSectionName').value=''; document.getElementById('newSectionName').focus(); }
}

function saveNewSection(){
  const n = document.getElementById('newSectionName').value.trim();
  if (!n) { showToast('أدخل اسم القسم', true); return; }
  if (data.sections.includes(n)) { showToast('موجود مسبقاً', true); return; }
  data.sections.push(n);
  saveData();
  populateSectionSelect();
  document.getElementById('sectionSelect').value = n;
  onSectionChange();
  toggleNewSectionForm();
  showToast('تم إضافة القسم');
}

function resizeImage(file,cb){const r=new FileReader();r.onload=function(ev){const img=new Image();img.onload=function(){const c=document.createElement('canvas'),mx=200;let w=img.width,h=img.height;if(w>h){if(w>mx){h=h*mx/w;w=mx;}}else{if(h>mx){w=w*mx/h;h=mx;}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.7));};img.src=ev.target.result;};r.readAsDataURL(file);}
function setImageUI(dataId,previewId,placeholderId,removeBtnId,dataUrl){document.getElementById(dataId).value=dataUrl;const p=document.getElementById(previewId);p.src=dataUrl;p.style.display='block';document.getElementById(placeholderId).style.display='none';document.getElementById(removeBtnId).style.display='inline-block';}
function clearImageUI(dataId,fileId,previewId,placeholderId,removeBtnId){document.getElementById(dataId).value='';document.getElementById(fileId).value='';document.getElementById(previewId).style.display='none';document.getElementById(placeholderId).style.display='block';document.getElementById(removeBtnId).style.display='none';}
function handleQaImageUpload(e){const f=e.target.files[0];if(!f)return;resizeImage(f,d=>setImageUI('qaImageData','qaImgPreview','qaImgPlaceholder','qaImgRemoveBtn',d));}
function removeQaImage(e){e.stopPropagation();clearImageUI('qaImageData','qaImage','qaImgPreview','qaImgPlaceholder','qaImgRemoveBtn');}
function resetQaImageUI(){clearImageUI('qaImageData','qaImage','qaImgPreview','qaImgPlaceholder','qaImgRemoveBtn');}

function saveQuickadd(){
  const sec = document.getElementById('sectionSelect').value;
  if (!sec) { showToast('اختر القسم أولاً', true); return; }
  const n=document.getElementById('qaName').value.trim();
  if(!n){showToast('أدخل اسم السلعة',true);return;}
  const cat=document.getElementById('qaCatalog').value.trim(),ph=document.getElementById('qaPhone').value.trim(),notes=document.getElementById('qaNotes').value.trim(),img=document.getElementById('qaImageData').value||'';
  data.materials.push({id:data.nextId++,section:sec,name:n,price:0,qty:0,unit:'kg',image:img,phone:ph,website:'',place:'',catalog:cat,notes:notes});
  saveData();
  showToast('تم حفظ السلعة');
  document.getElementById('qaName').value='';
  document.getElementById('qaCatalog').value='';
  document.getElementById('qaPhone').value='';
  document.getElementById('qaNotes').value='';
  resetQaImageUI();
  document.getElementById('qaName').focus();
}

fetchData();
</script>
</body>
</html>
